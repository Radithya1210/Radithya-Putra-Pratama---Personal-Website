    <style>
      .pagination-container {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 3rem 0 1rem 0;
        gap: 0.75rem;
        width: 100%;
      }

      .btn-pagination {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-color, #ffffff);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .btn-pagination:hover:not(:disabled) {
        background: var(--text-color, #ffffff);
        color: var(--bg-color, #0a0a0a);
        transform: scale(1.08);
        box-shadow: 0 6px 20px rgba(255, 255, 255, 0.15);
      }

      .btn-pagination:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .pagination-numbers {
        display: flex;
        gap: 0.5rem;
      }

      .page-num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.02);
        color: var(--text-color, #ffffff);
        border: 1px solid rgba(255, 255, 255, 0.05);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .page-num:hover:not(.active):not(:disabled) {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      .page-num.active {
        background: var(--text-color, #ffffff);
        color: var(--bg-color, #0a0a0a);
        border-color: var(--text-color, #ffffff);
        box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
      }

      .page-num:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .pagination-status-text {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.5px;
        text-align: center;
        margin-bottom: 3rem;
        transition: color 0.3s ease;
      }

      /* Efek Transisi Kelembutan Render Foto */
      .gallery-card {
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03); /* Latar belakang placeholder */
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      /* Gambar disembunyikan sampai selesai dimuat dalam batch */
      .gallery-card img {
        opacity: 0;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .gallery-card img.loaded {
        opacity: 1;
      }

      /* Animasi Pulse Skeleton saat menunggu antrean render */
      @keyframes skeletonPulse {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 0.25;
        }
        100% {
          opacity: 0.5;
        }
      }

      .gallery-card.loading-skeleton::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.05),
          transparent
        );
        animation: skeletonPulse 1.5s ease infinite;
        z-index: 1;
      }

      /* Hilangkan efek loading saat gambar siap tampil */
      .gallery-card:not(.loading-skeleton)::before {
        display: none;
      }

      /* Adaptasi Warna untuk Light Mode */
      html[data-theme="light"] .btn-pagination,
      html[data-theme="light"] .page-num {
        background: rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(0, 0, 0, 0.08);
        color: #1a1a1a;
      }

      html[data-theme="light"] .btn-pagination:hover:not(:disabled),
      html[data-theme="light"] .page-num.active {
        background: #1a1a1a;
        color: #ffffff;
        border-color: #1a1a1a;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      }

      html[data-theme="light"] .page-num:hover:not(.active):not(:disabled) {
        background: rgba(0, 0, 0, 0.08);
      }

      html[data-theme="light"] .pagination-status-text {
        color: rgba(0, 0, 0, 0.6);
      }

      html[data-theme="light"] .gallery-card {
        background: rgba(0, 0, 0, 0.05);
      }

    <script>

          desc: "Galeri Dokumentasi Eight Seven",
        },
        {
          id: 9,
          title: "28 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/4.jpg",
          desc: "Galeri Dokumentasi Eight Seven",
        },
        {

          title: "28 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/6.jpg",
          desc: "Galeri Dokumentasi Eight Seven",
        },
        {
          id: 11,
          title: "28 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/7.jpg",
          desc: "Galeri Dokumentasi Eight Seven",
        },
      ];

      // Array video kosong untuk mencegah error pembacaan
      const videos = [];

      let currentSection = "photo"; // 'photo' atau 'video'
      let activeIndex = 0; // Index media yang sedang aktif di viewer

      // STATE UNTUK HALAMAN FOTO (PAGINATION PINTAR & PENJAGA RAM)
      let currentPage = 1;
      let totalPages = 1;
      let itemsPerPage = 20; // Dibatasi 20 items per halaman untuk optimasi RAM ekstrim

      // Array penampung objek Image yang aktif mengunduh untuk pembatalan instan saat ganti halaman
      let activeImageLoaders = [];
      let activeLoadSessionId = 0;

      // Helper CDN Image Compressor Proxy (weserv.nl)
      // Dipaksa kompresi ke resolusi 320px dengan format WEBP output & kualitas 40% (Ringan sekali untuk RAM)
      function getCompressedUrl(originalSrc) {
        return `https://images.weserv.nl/?url=${encodeURIComponent(originalSrc)}&w=320&q=40&output=webp`;
      }

      // Fungsi vital untuk menghancurkan referensi gambar lama secara instan sebelum dihapus dari DOM
      function cleanupCurrentGridImages() {
        const grid = document.getElementById("photo-grid");
        if (grid) {
          const imgs = grid.querySelectorAll("img");
          imgs.forEach((img) => {
            img.onload = null;
            img.onerror = null;
            // Mengarahkan ke minimal data-URI memaksa browser menghapus cache dekode pixel dari memori RAM
            img.src =
              "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'></svg>";
          });
        }
      }

      // Fungsi untuk menghentikan & membatalkan semua koneksi HTTP gambar yang sedang berjalan
      function cancelPendingDownloads() {
        activeImageLoaders.forEach((img) => {
          img.onload = null;
          img.onerror = null;
          img.src =
            "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'></svg>";
        });
        activeImageLoaders = [];
      }

      // Fungsi menginisialisasi pembagian foto pintar per halaman
      function initPhotoPagination() {
        const total = photos.length;
        // Gunakan batas konstan 20 foto per halaman untuk menjaga stabilitas RAM
        itemsPerPage = 20;
        totalPages = Math.ceil(total / itemsPerPage);
        currentPage = 1;
      }

      // Render Photo Cards berdasarkan Halaman dengan pembersihan sampah memori ketat
      async function renderPhotos() {
        // 1. Bersihkan sampah memori dari halaman sebelumnya terlebih dahulu
        cleanupCurrentGridImages();
        cancelPendingDownloads();

        activeLoadSessionId++;
        const currentSession = activeLoadSessionId;

        const grid = document.getElementById("photo-grid");
        grid.innerHTML = "";

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = Math.min(startIndex + itemsPerPage, photos.length);
        const visiblePhotos = photos.slice(startIndex, endIndex);

        // Langkah 1: Render kerangka/skeleton instan
        visiblePhotos.forEach((photo, index) => {
          const globalIndex = startIndex + index;
          const card = `
            <div class="gallery-card loading-skeleton" id="card-${globalIndex}" onclick="openViewer(${globalIndex}, 'photo')">
              <img alt="${photo.title}" />
              <div class="card-overlay">
                <span class="card-tag">Foto</span>
                <h3 class="card-title">${photo.title}</h3>
              </div>
            </div>
          `;
          grid.insertAdjacentHTML("beforeend", card);
        });

        // Perbarui Kontrol Navigasi Halaman
        const paginationWrapper = document.getElementById("pagination-wrapper");
        const paginationStatus = document.getElementById("pagination-status");

        if (totalPages > 1) {
          paginationWrapper.style.display = "flex";
          paginationStatus.style.display = "block";
          paginationStatus.textContent = `Menampilkan ${startIndex + 1} - ${endIndex} dari ${photos.length} foto (Halaman ${currentPage} dari ${totalPages})`;
          renderPaginationControls();
        } else {
          paginationWrapper.style.display = "none";
          paginationStatus.style.display = "none";
        }

        // Langkah 2: Proses pemuatan gambar sekuensial (Batching berurutan per 5 foto demi menjaga CPU)
        const batchSize = 5;
        for (let i = 0; i < visiblePhotos.length; i += batchSize) {
          // Jika pengguna telah berpindah halaman, hentikan pemrosesan batch lama seketika
          if (currentSession !== activeLoadSessionId) return;

          const batch = visiblePhotos.slice(i, i + batchSize);

          // Muat batch kecil secara paralel
          const batchPromises = batch.map((photo, batchIndex) => {
            const globalIndex = startIndex + i + batchIndex;
            return new Promise((resolve) => {
              const cardElement = document.getElementById(
                `card-${globalIndex}`,
              );
              const imgElement = cardElement
                ? cardElement.querySelector("img")
                : null;

              if (!imgElement) {
                resolve();
                return;
              }

              const tempImg = new Image();
              activeImageLoaders.push(tempImg);

              const compressedSrc = getCompressedUrl(photo.src);

              tempImg.onload = () => {
                if (currentSession === activeLoadSessionId) {
                  imgElement.src = compressedSrc;
                  imgElement.classList.add("loaded");
                  cardElement.classList.remove("loading-skeleton");
                }
                activeImageLoaders = activeImageLoaders.filter(
                  (item) => item !== tempImg,
                );
                resolve();
              };

              tempImg.onerror = () => {
                if (currentSession === activeLoadSessionId) {
                  // Fallback src asli jika proxy gagal
                  imgElement.src = photo.src;
                  imgElement.classList.add("loaded");
                  cardElement.classList.remove("loading-skeleton");
                }
                activeImageLoaders = activeImageLoaders.filter(
                  (item) => item !== tempImg,
                );
                resolve();
              };

              tempImg.src = compressedSrc;
            });
          });

          // Jeda mikro 40ms antar batch agar browser memiliki waktu untuk melakukan garbage collection & rendering frame
          await Promise.all([
            Promise.all(batchPromises),
            new Promise((resolve) => setTimeout(resolve, 40)),
          ]);
        }
      }

      // Render tombol nomor halaman secara dinamis
      function renderPaginationControls() {
        const prevBtn = document.getElementById("prev-page-btn");
        const nextBtn = document.getElementById("next-page-btn");
        const numContainer = document.getElementById("pagination-numbers");

        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;

        numContainer.innerHTML = "";

        // Render semua halaman
        for (let i = 1; i <= totalPages; i++) {
          const numBtn = document.createElement("button");
          numBtn.className = `page-num ${i === currentPage ? "active" : ""}`;
          numBtn.textContent = i;
          numBtn.onclick = () => goToPage(i);
          numContainer.appendChild(numBtn);
        }
      }

      // Fungsi berpindah halaman secara Langsung/Instan (Memicu render urut bebas lag)
      function goToPage(pageNumber) {
        if (
          pageNumber < 1 ||
          pageNumber > totalPages ||
          pageNumber === currentPage
        )
          return;

        currentPage = pageNumber;
        renderPhotos();

        // Auto scroll kembali ke atas galeri secara halus
        document
          .querySelector(".section-nav")
          .scrollIntoView({ behavior: "smooth" });
      }

      // Navigasi via tombol Panah Kiri / Kanan
      function changePage(direction) {
        goToPage(currentPage + direction);
      }

      // Render Video Cards dengan pemanfaatan Tag Video (#t=1) sebagai generator thumbnail otomatis
      function renderVideos() {
        const grid = document.getElementById("video-grid");
        grid.innerHTML = "";

        if (videos.length === 0) {
          grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; padding: 2rem;">Belum ada video saat ini.</p>`;
          return;
        }

        videos.forEach((video, index) => {
          const card = `
            <div class="gallery-card" onclick="openViewer(${index}, 'video')">
              <div class="video-thumbnail-wrapper">
                <video src="${video.src}#t=1" preload="metadata" muted playsinline></video>
                <div class="play-badge">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                  </svg>
                </div>
              </div>
              <div class="card-overlay">
                <span class="card-tag">Video</span>
                <h3 class="card-title">${video.title}</h3>
              </div>
            </div>
          `;
          grid.insertAdjacentHTML("beforeend", card);
        });
      }

      // Switch Section
      function switchSection(section) {
        currentSection = section;
        const navBtns = document.querySelectorAll(".nav-btn");
        const photoSec = document.getElementById("photo-section");
        const videoSec = document.getElementById("video-section");

        navBtns.forEach((btn) => btn.classList.remove("active"));

        if (section === "photo") {
          navBtns[0].classList.add("active");
          photoSec.classList.add("active");
          videoSec.classList.remove("active");
        } else {
          navBtns[1].classList.add("active");
          videoSec.classList.add("active");
          photoSec.classList.remove("active");
        }
      }

      // Open Floating Viewer (Lightbox)
      function openViewer(index, type) {
        activeIndex = index;
        currentSection = type;
        const viewer = document.getElementById("media-viewer");
        viewer.classList.add("active");
        renderViewerContent();
      }

      // Close Viewer
      function closeViewer() {
        const viewer = document.getElementById("media-viewer");
        viewer.classList.remove("active");
        const mediaBox = document.getElementById("viewer-media-box");

        // Hentikan video agar tidak bersuara di background saat ditutup
        mediaBox.innerHTML = "";
      }

      // Render Viewer Content - PENTING: Lightbox & Unduh menggunakan SRC asli (HD / Kualitas Penuh)
      function renderViewerContent() {
        const mediaBox = document.getElementById("viewer-media-box");
        const titleEl = document.getElementById("viewer-media-title");
        const descEl = document.getElementById("viewer-media-desc");
        const downloadBtn = document.getElementById("download-btn");

        const items = currentSection === "photo" ? photos : videos;
        const currentItem = items[activeIndex];

        titleEl.textContent = currentItem.title;
        descEl.textContent = currentItem.desc || "Galeri Dokumentasi";

        // Handler Unduh Berkualitas Tinggi (Menggunakan berkas asli original, TANPA kompresi)
        downloadBtn.onclick = () => {
          const link = document.createElement("a");
          link.href = currentItem.src;
          link.download = currentItem.title;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        };

        if (currentSection === "photo") {
          // Lightbox menggunakan RESOLUSI ASLI FULL HD demi kepuasan pandangan visual
          mediaBox.innerHTML = `<img src="${currentItem.src}" alt="${currentItem.title}">`;
        } else {
          // Render pemutar video kustom premium
          mediaBox.innerHTML = `
            <div class="custom-player-wrapper" id="custom-video-wrapper">
              <video id="kustom-video-el" src="${currentItem.src}"></video>

              <!-- Tombol Play Raksasa di Tengah -->
              <div class="giant-play-btn" onclick="toggleKustomPlay()">
                <svg id="giant-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
              </div>

              <!-- Bar Kontrol Kustom -->
              <div class="video-custom-controls">

                <!-- Progress bar -->
                <div class="video-timeline-container" id="video-timeline" onclick="seekVideo(event)">
                  <div class="video-timeline-fill" id="video-timeline-fill"></div>
                  <div class="video-timeline-handle" id="video-timeline-handle"></div>
                </div>

                <!-- Tombol aksi -->
                <div class="video-controls-row">
                  <div class="video-controls-left">
                    <button class="video-control-btn" onclick="toggleKustomPlay()">
                      <svg id="video-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                      </svg>
                    </button>
                    <div class="video-time-display">
                      <span id="v-current-time">0:00</span> / <span id="v-total-time">0:00</span>
                    </div>
                  </div>

                  <div class="video-controls-right">
                    <!-- Volume Control -->
                    <div class="video-volume-wrap">
                      <button class="video-control-btn" onclick="toggleMute()">
                        <svg id="volume-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                      </button>
                      <div class="video-volume-slider" onclick="adjustVideoVolume(event)">
                        <div class="video-volume-fill" id="v-volume-fill"></div>
                      </div>
                    </div>

                    <!-- Fullscreen -->
                    <button class="video-control-btn" onclick="toggleFullscreen()">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                      </svg>
                    </button>
                  </div>
                </div>

              </div>
            </div>
          `;

          // Jalankan inisialisasi pemutar video kustom
          initCustomVideoPlayer();
        }
      }

      // Navigasi Media (Kiri / Kanan)
      function navigateMedia(direction) {
        const items = currentSection === "photo" ? photos : videos;
        activeIndex += direction;

        if (activeIndex < 0) {
          activeIndex = items.length - 1;
        } else if (activeIndex >= items.length) {
          activeIndex = 0;
        }

        renderViewerContent();
      }

      // --- KUSTOM VIDEO PLAYER ENGINE ---
      let vElement,
        vTimelineFill,
        vTimelineHandle,
        vPlayIcon,
        vGiantPlayIcon,
        vCurrentTime,
        vTotalTime,
        vVolumeFill,
        vVolumeIcon;

      function initCustomVideoPlayer() {
        vElement = document.getElementById("kustom-video-el");
        vTimelineFill = document.getElementById("video-timeline-fill");
        vTimelineHandle = document.getElementById("video-timeline-handle");
        vPlayIcon = document.getElementById("video-play-icon");
        vGiantPlayIcon = document.getElementById("giant-play-icon");
        vCurrentTime = document.getElementById("v-current-time");
        vTotalTime = document.getElementById("v-total-time");
        vVolumeFill = document.getElementById("v-volume-fill");
        vVolumeIcon = document.getElementById("volume-icon");

        vElement.addEventListener("timeupdate", () => {
          const curTime = vElement.currentTime;
          const duration = vElement.duration || 1;
          const percentage = (curTime / duration) * 100;

          if (vTimelineFill) vTimelineFill.style.width = `${percentage}%`;
          if (vTimelineHandle) vTimelineHandle.style.left = `${percentage}%`;

          if (vCurrentTime) {
            const min = Math.floor(curTime / 60);
            const sec = Math.floor(curTime % 60)
              .toString()
              .padStart(2, "0");
            vCurrentTime.textContent = `${min}:${sec}`;
          }
        });

        vElement.addEventListener("loadedmetadata", () => {
          const duration = vElement.duration;
          const min = Math.floor(duration / 60);
          const sec = Math.floor(duration % 60)
            .toString()
            .padStart(2, "0");
          if (vTotalTime) vTotalTime.textContent = `${min}:${sec}`;
        });

        vElement.addEventListener("ended", () => {
          vElement.currentTime = 0;
          updateVideoIcons(false);
        });
      }

      function toggleKustomPlay() {
        if (!vElement) return;
        if (vElement.paused) {
          vElement.play();
          updateVideoIcons(true);
        } else {
          vElement.pause();
          updateVideoIcons(false);
        }
      }

      function updateVideoIcons(isPlaying) {
        if (isPlaying) {
          vPlayIcon.outerHTML = `
            <svg id="video-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          `;
          vGiantPlayIcon.outerHTML = `
            <svg id="giant-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          `;
        } else {
          vPlayIcon.outerHTML = `
            <svg id="video-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          `;
          vGiantPlayIcon.outerHTML = `
            <svg id="giant-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          `;
        }
        vPlayIcon = document.getElementById("video-play-icon");
        vGiantPlayIcon = document.getElementById("giant-play-icon");
      }

      function seekVideo(event) {
        const timeline = document.getElementById("video-timeline");
        const rect = timeline.getBoundingClientRect();
        const clickPositionX = event.clientX - rect.left;
        const totalWidth = rect.width;

        let targetPercentage = clickPositionX / totalWidth;
        if (targetPercentage < 0) targetPercentage = 0;
        if (targetPercentage > 1) targetPercentage = 1;

        if (vElement) {
          vElement.currentTime = targetPercentage * vElement.duration;
        }
      }

      function adjustVideoVolume(event) {
        const slider = event.currentTarget;
        const rect = slider.getBoundingClientRect();
        const clickPositionX = event.clientX - rect.left;
        const totalWidth = rect.width;

        let targetVolume = clickPositionX / totalWidth;
        if (targetVolume < 0) targetVolume = 0;
        if (targetVolume > 1) targetVolume = 1;

        if (vElement) {
          vElement.volume = targetVolume;
          vVolumeFill.style.width = `${targetVolume * 100}%`;
          vElement.muted = false;
        }
      }

      function toggleMute() {
        if (!vElement) return;
        if (vElement.muted) {
          vElement.muted = false;
          vVolumeFill.style.width = `${vElement.volume * 100}%`;
        } else {
          vElement.muted = true;
          vVolumeFill.style.width = "0%";
        }
      }

      function toggleFullscreen() {
        const wrapper = document.getElementById("custom-video-wrapper");
        if (!document.fullscreenElement) {
          wrapper.requestFullscreen().catch((err) => console.log(err));
        } else {
          document.exitFullscreen();
        }
      }

      // --- MOUSE FOLLOW EFFECT ---
      const glowOrb = document.getElementById("mouse-glow");
      document.addEventListener("mousemove", (e) => {
        glowOrb.style.opacity = "1";
        glowOrb.style.left = e.clientX + "px";
        glowOrb.style.top = e.clientY + "px";
      });
      document.addEventListener("mouseleave", () => {
        glowOrb.style.opacity = "0";
      });

      // --- 3-THEME CONFIGURATION ---
      const themeBtns = document.querySelectorAll(".theme-btn");

      function setTheme(themeName) {
        if (themeName === "default") {
          document.documentElement.removeAttribute("data-theme");
        } else {
          document.documentElement.setAttribute("data-theme", themeName);
        }
        localStorage.setItem("radithya-portfolio-theme", themeName);

        themeBtns.forEach((btn) => {
          if (btn.getAttribute("data-theme-val") === themeName) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
      }

      const storedTheme =
        localStorage.getItem("radithya-portfolio-theme") || "default";
      setTheme(storedTheme);

      themeBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const selectedTheme = btn.getAttribute("data-theme-val");
          setTheme(selectedTheme);
        });
      });

      // Key Listener for Lightbox Navigations (Arrow keys and Escape)
      document.addEventListener("keydown", (e) => {
        const viewer = document.getElementById("media-viewer");
        if (viewer.classList.contains("active")) {
          if (e.key === "ArrowRight") navigateMedia(1);
          if (e.key === "ArrowLeft") navigateMedia(-1);
          if (e.key === "Escape") closeViewer();
        }
      });

      // DOM Content Loaded Initializer
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("footer-year").textContent =
          new Date().getFullYear();

        // Jalankan inisialisasi pembagian foto pintar sebelum me-render foto
        initPhotoPagination();
        renderPhotos();
        renderVideos();
      });
    </script>
  </body>
</html>
