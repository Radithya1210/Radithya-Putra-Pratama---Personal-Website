<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Radithya Putra Pratama - Personal Website - Album Kenangan - Eight Seven
    </title>
    <link rel="icon" type="image/png" href="./asset/img/logo.png" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* Theme Default: Deep Obsidian Blue */
        --bg-primary: #030712;
        --bg-secondary: #0b1528;
        --bg-card: rgba(15, 23, 42, 0.6);
        --border-color: rgba(59, 130, 246, 0.15);
        --border-hover: rgba(59, 130, 246, 0.4);
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --accent-color: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.35);
        --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        --glass-blur: blur(12px);
        --font-main: "Plus Jakarta Sans", sans-serif;
        --font-display: "Space Grotesk", sans-serif;
        --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

        --bg-home:
          radial-gradient(
            circle at 50% 20%,
            rgba(59, 130, 246, 0.1),
            transparent 50%
          ),
          #030712;
      }

      /* Dark Mode: Pure Obsidian Dark */
      [data-theme="dark"] {
        --bg-primary: #050505;
        --bg-secondary: #0f0f0f;
        --bg-card: rgba(20, 20, 20, 0.7);
        --border-color: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(255, 255, 255, 0.2);
        --text-primary: #fafafa;
        --text-secondary: #888888;
        --accent-color: #ffffff;
        --accent-glow: rgba(255, 255, 255, 0.1);
        --accent-gradient: linear-gradient(135deg, #ffffff 0%, #333333 100%);

        --bg-home:
          radial-gradient(
            circle at 50% 20%,
            rgba(255, 255, 255, 0.02),
            transparent 50%
          ),
          #050505;
      }

      /* Light Mode: Minimalist Apple White */
      [data-theme="light"] {
        --bg-primary: #f5f5f7;
        --bg-secondary: #ffffff;
        --bg-card: rgba(255, 255, 255, 0.85);
        --border-color: rgba(0, 0, 0, 0.08);
        --border-hover: rgba(0, 102, 204, 0.3);
        --text-primary: #1d1d1f;
        --text-secondary: #6e6e73;
        --accent-color: #0066cc;
        --accent-glow: rgba(0, 102, 204, 0.12);
        --accent-gradient: linear-gradient(135deg, #0066cc 0%, #004499 100%);

        --bg-home:
          radial-gradient(
            circle at 50% 20%,
            rgba(0, 102, 204, 0.03),
            transparent 50%
          ),
          #f5f5f7;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }

      body {
        background-color: var(--bg-primary);
        background-image: var(--bg-home);
        color: var(--text-primary);
        font-family: var(--font-main);
        overflow-x: hidden;
        transition:
          background-color 0.5s ease,
          color 0.5s ease;
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      h1,
      h2,
      h3 {
        font-family: var(--font-display);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-color);
      }

      /* Mouse Glow Effect */
      #mouse-glow {
        position: fixed;
        width: 350px;
        height: 350px;
        background: var(--accent-glow);
        filter: blur(80px);
        border-radius: 50%;
        pointer-events: none;
        z-index: 1;
        transform: translate(-50%, -50%);
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      /* Header Minimalist Back & Theme Control */
      .header-controls {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 30px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 10;
        position: relative;
      }

      .btn-back-home {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-primary);
        font-weight: 600;
        font-size: 0.95rem;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        padding: 10px 20px;
        border-radius: 30px;
        cursor: pointer;
        transition: var(--transition-smooth);
        text-decoration: none;
      }

      .btn-back-home:hover {
        border-color: var(--border-hover);
        transform: translateX(-4px);
        background: rgba(255, 255, 255, 0.02);
        box-shadow: 0 4px 15px var(--accent-glow);
      }

      .theme-switcher {
        display: flex;
        background: rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border-color);
        border-radius: 30px;
        padding: 4px;
        gap: 4px;
      }

      [data-theme="light"] .theme-switcher {
        background: rgba(0, 0, 0, 0.05);
      }

      .theme-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        transition: var(--transition-smooth);
      }

      .theme-btn:hover {
        color: var(--text-primary);
      }

      .theme-btn.active {
        background: var(--accent-gradient);
        color: #ffffff;
        box-shadow: 0 0 10px var(--accent-glow);
      }

      /* Hero Title */
      .hero-section {
        text-align: center;
        padding: 40px 24px;
        z-index: 2;
      }

      .hero-title {
        font-size: 3.2rem;
        line-height: 1.1;
        margin-bottom: 12px;
        background: linear-gradient(
          135deg,
          var(--text-primary) 30%,
          var(--text-secondary) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero-desc {
        color: var(--text-secondary);
        font-size: 1.1rem;
        max-width: 600px;
        margin: 0 auto 32px auto;
      }

      /* Mini Navigation (Section Switcher) */
      .section-nav {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-bottom: 40px;
        z-index: 2;
        position: relative;
      }

      .nav-btn {
        background: var(--bg-card);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 30px;
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .nav-btn:hover {
        border-color: var(--border-hover);
        color: var(--text-primary);
      }

      .nav-btn.active {
        background: var(--accent-gradient);
        color: white;
        border-color: transparent;
        box-shadow: 0 4px 15px var(--accent-glow);
      }

      /* Gallery Content Containers */
      .gallery-container {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        padding: 0 24px;
        z-index: 2;
        position: relative;
        flex-grow: 1;
      }

      .gallery-section {
        display: none;
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .gallery-section.active {
        display: block;
      }

      /* Pure 5-Grid Layout on desktop, gracefully scaling down to 1-grid on mobile */
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
        margin-bottom: 60px;
      }

      @media (max-width: 1200px) {
        .gallery-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      @media (max-width: 900px) {
        .gallery-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 600px) {
        .gallery-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 420px) {
        .gallery-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Card Style */
      .gallery-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        aspect-ratio: 4/5; /* Menjaga konsistensi grid card */
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition-smooth);
      }

      .gallery-card:hover {
        border-color: var(--border-hover);
        transform: translateY(-6px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .gallery-card img,
      .gallery-card video,
      .gallery-card .video-thumbnail-wrapper {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: var(--transition-smooth);
      }

      .gallery-card:hover img,
      .gallery-card:hover video {
        transform: scale(1.05);
      }

      /* Video Card Specifics */
      .video-thumbnail-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .play-badge {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50px;
        height: 50px;
        background: var(--accent-gradient);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 4px 15px var(--accent-glow);
        z-index: 2;
        transition: var(--transition-smooth);
      }

      .gallery-card:hover .play-badge {
        transform: translate(-50%, -50%) scale(1.15);
        box-shadow: 0 6px 20px var(--accent-color);
      }

      /* Card Overlay Information */
      .card-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 16px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
        color: white;
        opacity: 0;
        transition: var(--transition-smooth);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        z-index: 3;
      }

      .gallery-card:hover .card-overlay {
        opacity: 1;
      }

      .card-title {
        font-size: 0.95rem;
        font-weight: 700;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-tag {
        font-size: 0.75rem;
        color: var(--accent-color);
        font-weight: 600;
        text-transform: uppercase;
      }

      /* Lightbox/Floating Viewer Overlay */
      .viewer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(3, 7, 18, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        z-index: 1001;
        opacity: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        padding: 24px;
      }

      .viewer-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      /* Close, Download & Nav Buttons on Viewer */
      .viewer-header {
        position: absolute;
        top: 24px;
        right: 24px;
        display: flex;
        gap: 16px;
        z-index: 1005;
      }

      .viewer-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition-smooth);
        backdrop-filter: blur(5px);
      }

      .viewer-btn:hover {
        background: var(--accent-gradient);
        border-color: transparent;
        box-shadow: 0 0 15px var(--accent-color);
        transform: scale(1.05);
      }

      /* Flexible Media Container (Landscape & Portrait Friendly) */
      .viewer-content-wrap {
        width: 100%;
        max-width: 1000px;
        height: calc(100% - 140px);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1002;
      }

      .viewer-media-box {
        max-width: 100%;
        max-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        background: #000;
        position: relative;
      }

      /* Image fit styles within Box */
      .viewer-media-box img {
        max-width: 100%;
        max-height: 80vh;
        object-fit: contain;
        display: block;
        animation: mediaScale 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Custom Video Player Structure */
      .custom-player-wrapper {
        position: relative;
        width: 100%;
        max-width: 100%;
        max-height: 80vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: mediaScale 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .custom-player-wrapper video {
        width: 100%;
        max-height: 80vh;
        object-fit: contain;
        background: black;
      }

      /* Controls overlay */
      .video-custom-controls {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        opacity: 0;
        transform: translateY(10px);
        transition: var(--transition-smooth);
        z-index: 5;
      }

      .custom-player-wrapper:hover .video-custom-controls {
        opacity: 1;
        transform: translateY(0);
      }

      /* Video progress timeline */
      .video-timeline-container {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
        cursor: pointer;
        position: relative;
        transition: height 0.2s ease;
      }

      .video-timeline-container:hover {
        height: 8px;
      }

      .video-timeline-fill {
        height: 100%;
        background: var(--accent-gradient);
        border-radius: 3px;
        width: 0%;
        position: absolute;
        top: 0;
        left: 0;
      }

      .video-timeline-handle {
        width: 12px;
        height: 12px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        left: 0%;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .video-timeline-container:hover .video-timeline-handle {
        opacity: 1;
      }

      /* Play, Pause, Time controls row */
      .video-controls-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: white;
      }

      .video-controls-left,
      .video-controls-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .video-control-btn {
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition-smooth);
      }

      .video-control-btn:hover {
        color: var(--accent-color);
        transform: scale(1.1);
      }

      .video-time-display {
        font-size: 0.85rem;
        font-family: var(--font-display);
        color: rgba(255, 255, 255, 0.8);
      }

      /* Volume slider kustom */
      .video-volume-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .video-volume-slider {
        width: 60px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        cursor: pointer;
        position: relative;
      }

      .video-volume-fill {
        height: 100%;
        background: white;
        border-radius: 2px;
        width: 80%;
      }

      /* Giant play/pause center button */
      .giant-play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: rgba(3, 7, 18, 0.8);
        border: 1px solid var(--border-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        z-index: 4;
        opacity: 0;
        transition: var(--transition-smooth);
      }

      .custom-player-wrapper:hover .giant-play-btn {
        opacity: 1;
      }

      /* Navigation Arrows */
      .viewer-nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition-smooth);
        z-index: 1003;
        backdrop-filter: blur(5px);
      }

      .viewer-nav-btn:hover {
        background: var(--accent-gradient);
        border-color: transparent;
        box-shadow: 0 0 15px var(--accent-color);
      }

      .nav-left {
        left: 24px;
      }
      .nav-right {
        right: 24px;
      }

      /* Title Info on Bottom */
      .viewer-footer-info {
        position: absolute;
        bottom: 24px;
        text-align: center;
        z-index: 1004;
      }

      .viewer-media-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: white;
        margin-bottom: 4px;
      }

      .viewer-media-desc {
        font-size: 0.9rem;
        color: var(--text-secondary);
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes mediaScale {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Footer */
      footer {
        border-top: 1px solid var(--border-color);
        padding: 40px 24px;
        background: var(--bg-secondary);
        position: relative;
        z-index: 2;
        margin-top: auto;
      }

      .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }

      .footer-logo {
        font-family: var(--font-display);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-primary);
      }

      .footer-copyright {
        font-size: 0.9rem;
        color: var(--text-secondary);
      }

      /* Responsive Adjustment for Navigation Arrows on mobile devices */
      @media (max-width: 768px) {
        .viewer-nav-btn {
          width: 44px;
          height: 44px;
        }
        .nav-left {
          left: 8px;
        }
        .nav-right {
          right: 8px;
        }
        .hero-title {
          font-size: 2.3rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Mouse Glow Effect -->
    <div id="mouse-glow"></div>

    <!-- Header Controls -->
    <div class="header-controls">
      <a href="index.html" class="btn-back-home">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 19"></polyline>
        </svg>
        Kembali ke Beranda
      </a>

      <!-- Theme Switcher (3-Modes) -->
      <div class="theme-switcher">
        <button
          class="theme-btn active"
          data-theme-val="default"
          title="Default Theme"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button class="theme-btn" data-theme-val="dark" title="Dark Mode">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="theme-btn" data-theme-val="light" title="Light Mode">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
            ></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="hero-section">
      <h1 class="hero-title">Eight Seven</h1>
      <p class="hero-desc">Angkatan 30</p>
    </div>

    <!-- Minimal Nav Section Switcher -->
    <div class="section-nav">
      <button class="nav-btn active" onclick="switchSection('photo')">
        Galeri Foto
      </button>
      <button class="nav-btn" onclick="switchSection('video')">
        Galeri Video
      </button>
    </div>

    <!-- Gallery Container -->
    <div class="gallery-container">
      <!-- Photo Section -->
      <div id="photo-section" class="gallery-section active">
        <div class="gallery-grid" id="photo-grid">
          <!-- Dinamis di-render oleh JS -->
        </div>
      </div>

      <!-- Video Section -->
      <div id="video-section" class="gallery-section">
        <div class="gallery-grid" id="video-grid">
          <!-- Dinamis di-render oleh JS -->
        </div>
      </div>
    </div>

    <!-- Lightbox/Floating Viewer Overlay -->
    <div class="viewer-overlay" id="media-viewer">
      <!-- Top controls -->
      <div class="viewer-header">
        <button class="viewer-btn" id="download-btn" title="Unduh File">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <button class="viewer-btn" onclick="closeViewer()" title="Tutup">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Navigation Arrows -->
      <button class="viewer-nav-btn nav-left" onclick="navigateMedia(-1)">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>

      <button class="viewer-nav-btn nav-right" onclick="navigateMedia(1)">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>

      <!-- Media Content Area -->
      <div class="viewer-content-wrap">
        <div class="viewer-media-box" id="viewer-media-box">
          <!-- Target render dinamis -->
        </div>
      </div>

      <!-- Footer Info -->
      <div class="viewer-footer-info">
        <div class="viewer-media-title" id="viewer-media-title">Judul Item</div>
        <div class="viewer-media-desc" id="viewer-media-desc">
          Kategori / Deskripsi Item
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-container">
        <div class="footer-logo">Radithya Putra Pratama</div>
        <div class="footer-copyright">
          &copy; <span id="footer-year"></span> Radithya. All Rights Reserved.
        </div>
      </div>
    </footer>

    <!-- JS Logic -->
    <script>
      // 11 Data Foto
      const photos = [
        {
          id: 1,
          title: "31 Agustus 2024",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/8.jpg",
        },
        {
          id: 2,
          title: "2 Oktober 2024",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/1.jpeg",
        },
        {
          id: 3,
          title: "2 Oktober 2024",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/2.jpg",
        },
        {
          id: 4,
          title: "2 Oktober 2024",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/3.jpg",
        },
        {
          id: 5,
          title: "25 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/9.jpg",
        },
        {
          id: 6,
          title: "25 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/10.jpg",
        },
        {
          id: 7,
          title: "25 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/11.jpg",
        },
        {
          id: 8,
          title: "28 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/5.jpg",
        },
        {
          id: 9,
          title: "28 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/4.jpg",
        },
        {
          id: 10,
          title: "28 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/6.jpg",
        },
        {
          id: 11,
          title: "28 Mei 2025",
          src: "https://radithya1210.github.io/Radithya-Putra-Pratama---Personal-Website/asset/img/eight seven/7.jpg",
        },
      ];

      let currentSection = "photo"; // 'photo' atau 'video'
      let activeIndex = 0; // Index media yang sedang aktif di viewer

      // Render Photo Cards
      function renderPhotos() {
        const grid = document.getElementById("photo-grid");
        grid.innerHTML = "";
        photos.forEach((photo, index) => {
          const card = `
            <div class="gallery-card" onclick="openViewer(${index}, 'photo')">
              <img src="${photo.src}" alt="${photo.title}" loading="lazy" />
              <div class="card-overlay">
                <span class="card-tag">Foto</span>
                <h3 class="card-title">${photo.title}</h3>
              </div>
            </div>
          `;
          grid.insertAdjacentHTML("beforeend", card);
        });
      }

      // Render Video Cards dengan pemanfaatan Tag Video (#t=1) sebagai generator thumbnail otomatis
      function renderVideos() {
        const grid = document.getElementById("video-grid");
        grid.innerHTML = "";
        videos.forEach((video, index) => {
          const card = `
            <div class="gallery-card" onclick="openViewer(${index}, 'video')">
              <div class="video-thumbnail-wrapper">
                <!-- t=1 memberitahu browser untuk menampilkan frame di detik ke-1 -->
                <video src="${video.src}#t=1" preload="metadata" muted playsinline></video>
                <div class="play-badge">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                  </svg>
                </div>
              </div>
              <div class="card-overlay">
                <span class="card-tag">Video</span>
                <h3 class="card-title">${video.title}</h3>
              </div>
            </div>
          `;
          grid.insertAdjacentHTML("beforeend", card);
        });
      }

      // Switch Section
      function switchSection(section) {
        currentSection = section;
        const navBtns = document.querySelectorAll(".nav-btn");
        const photoSec = document.getElementById("photo-section");
        const videoSec = document.getElementById("video-section");

        navBtns.forEach((btn) => btn.classList.remove("active"));

        if (section === "photo") {
          navBtns[0].classList.add("active");
          photoSec.classList.add("active");
          videoSec.classList.remove("active");
        } else {
          navBtns[1].classList.add("active");
          videoSec.classList.add("active");
          photoSec.classList.remove("active");
        }
      }

      // Open Floating Viewer (Lightbox)
      function openViewer(index, type) {
        activeIndex = index;
        currentSection = type;
        const viewer = document.getElementById("media-viewer");
        viewer.classList.add("active");
        renderViewerContent();
      }

      // Close Viewer
      function closeViewer() {
        const viewer = document.getElementById("media-viewer");
        viewer.classList.remove("active");
        const mediaBox = document.getElementById("viewer-media-box");

        // Hentikan video agar tidak bersuara di background saat ditutup
        mediaBox.innerHTML = "";
      }

      // Render Viewer Content
      function renderViewerContent() {
        const mediaBox = document.getElementById("viewer-media-box");
        const titleEl = document.getElementById("viewer-media-title");
        const descEl = document.getElementById("viewer-media-desc");
        const downloadBtn = document.getElementById("download-btn");

        const items = currentSection === "photo" ? photos : videos;
        const currentItem = items[activeIndex];

        titleEl.textContent = currentItem.title;
        descEl.textContent = currentItem.desc;

        // Custom download click handler
        downloadBtn.onclick = () => {
          // Melakukan download tiruan
          const link = document.createElement("a");
          link.href = currentItem.src;
          link.download = currentItem.title;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        };

        if (currentSection === "photo") {
          mediaBox.innerHTML = `<img src="${currentItem.src}" alt="${currentItem.title}">`;
        } else {
          // Render pemutar video kustom premium
          mediaBox.innerHTML = `
            <div class="custom-player-wrapper" id="custom-video-wrapper">
              <video id="kustom-video-el" src="${currentItem.src}"></video>
              
              <!-- Tombol Play Raksasa di Tengah -->
              <div class="giant-play-btn" onclick="toggleKustomPlay()">
                <svg id="giant-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
              </div>

              <!-- Bar Kontrol Kustom -->
              <div class="video-custom-controls">
                
                <!-- Progress bar -->
                <div class="video-timeline-container" id="video-timeline" onclick="seekVideo(event)">
                  <div class="video-timeline-fill" id="video-timeline-fill"></div>
                  <div class="video-timeline-handle" id="video-timeline-handle"></div>
                </div>

                <!-- Tombol aksi -->
                <div class="video-controls-row">
                  <div class="video-controls-left">
                    <button class="video-control-btn" onclick="toggleKustomPlay()">
                      <svg id="video-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                      </svg>
                    </button>
                    <div class="video-time-display">
                      <span id="v-current-time">0:00</span> / <span id="v-total-time">0:00</span>
                    </div>
                  </div>

                  <div class="video-controls-right">
                    <!-- Volume Control -->
                    <div class="video-volume-wrap">
                      <button class="video-control-btn" onclick="toggleMute()">
                        <svg id="volume-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                      </button>
                      <div class="video-volume-slider" onclick="adjustVideoVolume(event)">
                        <div class="video-volume-fill" id="v-volume-fill"></div>
                      </div>
                    </div>

                    <!-- Fullscreen -->
                    <button class="video-control-btn" onclick="toggleFullscreen()">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                      </svg>
                    </button>
                  </div>
                </div>

              </div>
            </div>
          `;

          // Jalankan inisialisasi pemutar video kustom
          initCustomVideoPlayer();
        }
      }

      // Navigasi Media (Kiri / Kanan)
      function navigateMedia(direction) {
        const items = currentSection === "photo" ? photos : videos;
        activeIndex += direction;

        if (activeIndex < 0) {
          activeIndex = items.length - 1;
        } else if (activeIndex >= items.length) {
          activeIndex = 0;
        }

        renderViewerContent();
      }

      // --- KUSTOM VIDEO PLAYER ENGINE ---
      let vElement,
        vTimelineFill,
        vTimelineHandle,
        vPlayIcon,
        vGiantPlayIcon,
        vCurrentTime,
        vTotalTime,
        vVolumeFill,
        vVolumeIcon;

      function initCustomVideoPlayer() {
        vElement = document.getElementById("kustom-video-el");
        vTimelineFill = document.getElementById("video-timeline-fill");
        vTimelineHandle = document.getElementById("video-timeline-handle");
        vPlayIcon = document.getElementById("video-play-icon");
        vGiantPlayIcon = document.getElementById("giant-play-icon");
        vCurrentTime = document.getElementById("v-current-time");
        vTotalTime = document.getElementById("v-total-time");
        vVolumeFill = document.getElementById("v-volume-fill");
        vVolumeIcon = document.getElementById("volume-icon");

        vElement.addEventListener("timeupdate", () => {
          const curTime = vElement.currentTime;
          const duration = vElement.duration || 1;
          const percentage = (curTime / duration) * 100;

          if (vTimelineFill) vTimelineFill.style.width = `${percentage}%`;
          if (vTimelineHandle) vTimelineHandle.style.left = `${percentage}%`;

          // Update teks waktu
          if (vCurrentTime) {
            const min = Math.floor(curTime / 60);
            const sec = Math.floor(curTime % 60)
              .toString()
              .padStart(2, "0");
            vCurrentTime.textContent = `${min}:${sec}`;
          }
        });

        vElement.addEventListener("loadedmetadata", () => {
          const duration = vElement.duration;
          const min = Math.floor(duration / 60);
          const sec = Math.floor(duration % 60)
            .toString()
            .padStart(2, "0");
          if (vTotalTime) vTotalTime.textContent = `${min}:${sec}`;
        });

        // Loop otomatis atau berlanjut
        vElement.addEventListener("ended", () => {
          vElement.currentTime = 0;
          updateVideoIcons(false);
        });
      }

      function toggleKustomPlay() {
        if (!vElement) return;
        if (vElement.paused) {
          vElement.play();
          updateVideoIcons(true);
        } else {
          vElement.pause();
          updateVideoIcons(false);
        }
      }

      function updateVideoIcons(isPlaying) {
        if (isPlaying) {
          vPlayIcon.outerHTML = `
            <svg id="video-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          `;
          vGiantPlayIcon.outerHTML = `
            <svg id="giant-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          `;
        } else {
          vPlayIcon.outerHTML = `
            <svg id="video-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          `;
          vGiantPlayIcon.outerHTML = `
            <svg id="giant-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          `;
        }
        // Ambil ulang referensi agar tidak rusak
        vPlayIcon = document.getElementById("video-play-icon");
        vGiantPlayIcon = document.getElementById("giant-play-icon");
      }

      function seekVideo(event) {
        const timeline = document.getElementById("video-timeline");
        const rect = timeline.getBoundingClientRect();
        const clickPositionX = event.clientX - rect.left;
        const totalWidth = rect.width;

        let targetPercentage = clickPositionX / totalWidth;
        if (targetPercentage < 0) targetPercentage = 0;
        if (targetPercentage > 1) targetPercentage = 1;

        if (vElement) {
          vElement.currentTime = targetPercentage * vElement.duration;
        }
      }

      function adjustVideoVolume(event) {
        const slider = event.currentTarget;
        const rect = slider.getBoundingClientRect();
        const clickPositionX = event.clientX - rect.left;
        const totalWidth = rect.width;

        let targetVolume = clickPositionX / totalWidth;
        if (targetVolume < 0) targetVolume = 0;
        if (targetVolume > 1) targetVolume = 1;

        if (vElement) {
          vElement.volume = targetVolume;
          vVolumeFill.style.width = `${targetVolume * 100}%`;
          vElement.muted = false;
        }
      }

      function toggleMute() {
        if (!vElement) return;
        if (vElement.muted) {
          vElement.muted = false;
          vVolumeFill.style.width = `${vElement.volume * 100}%`;
        } else {
          vElement.muted = true;
          vVolumeFill.style.width = "0%";
        }
      }

      function toggleFullscreen() {
        const wrapper = document.getElementById("custom-video-wrapper");
        if (!document.fullscreenElement) {
          wrapper.requestFullscreen().catch((err) => console.log(err));
        } else {
          document.exitFullscreen();
        }
      }

      // --- MOUSE FOLLOW EFFECT ---
      const glowOrb = document.getElementById("mouse-glow");
      document.addEventListener("mousemove", (e) => {
        glowOrb.style.opacity = "1";
        glowOrb.style.left = e.clientX + "px";
        glowOrb.style.top = e.clientY + "px";
      });
      document.addEventListener("mouseleave", () => {
        glowOrb.style.opacity = "0";
      });

      // --- 3-THEME CONFIGURATION ---
      const themeBtns = document.querySelectorAll(".theme-btn");

      function setTheme(themeName) {
        if (themeName === "default") {
          document.documentElement.removeAttribute("data-theme");
        } else {
          document.documentElement.setAttribute("data-theme", themeName);
        }
        localStorage.setItem("radithya-portfolio-theme", themeName);

        themeBtns.forEach((btn) => {
          if (btn.getAttribute("data-theme-val") === themeName) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
      }

      const storedTheme =
        localStorage.getItem("radithya-portfolio-theme") || "default";
      setTheme(storedTheme);

      themeBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const selectedTheme = btn.getAttribute("data-theme-val");
          setTheme(selectedTheme);
        });
      });

      // Key Listener for Lightbox Navigations (Arrow keys and Escape)
      document.addEventListener("keydown", (e) => {
        const viewer = document.getElementById("media-viewer");
        if (viewer.classList.contains("active")) {
          if (e.key === "ArrowRight") navigateMedia(1);
          if (e.key === "ArrowLeft") navigateMedia(-1);
          if (e.key === "Escape") closeViewer();
        }
      });

      // DOM Content Loaded Initializer
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("footer-year").textContent =
          new Date().getFullYear();
        renderPhotos();
        renderVideos();
      });
    </script>
  </body>
</html>
